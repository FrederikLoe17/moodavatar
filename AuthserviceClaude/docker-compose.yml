version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: moodavatar-postgres
    environment:
      POSTGRES_DB: moodavatar_auth
      POSTGRES_USER: moodavatar
      POSTGRES_PASSWORD: secret123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moodavatar -d moodavatar_auth"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  auth-service:
    build: .
    container_name: moodavatar-auth
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: moodavatar_auth
      DB_USER: moodavatar
      DB_PASSWORD: secret123
      JWT_SECRET: super-secret-jwt-key-change-in-production
      JWT_ISSUER: moodavatar
      JWT_AUDIENCE: moodavatar-users
      JWT_ACCESS_EXPIRY_MS: 900000        # 15 Minuten
      JWT_REFRESH_EXPIRY_MS: 2592000000   # 30 Tage
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      APP_BASE_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy

  # Lokaler Mail-Server zum Testen (kein echter E-Mail-Versand)
  mailhog:
    image: mailhog/mailhog
    container_name: moodavatar-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI → http://localhost:8025

volumes:
  postgres_data: