ktor {
    deployment {
        port = 8081
    }
    application {
        modules = [ com.moodavatar.auth.ApplicationKt.module ]
    }
}

jwt {
    secret = ${JWT_SECRET}
    issuer = ${JWT_ISSUER}
    audience = ${JWT_AUDIENCE}
    accessExpiryMs = ${JWT_ACCESS_EXPIRY_MS}
    refreshExpiryMs = ${JWT_REFRESH_EXPIRY_MS}
}

database {
    host = ${DB_HOST}
    port = ${DB_PORT}
    name = ${DB_NAME}
    user = ${DB_USER}
    password = ${DB_PASSWORD}
}

smtp {
    host = ${SMTP_HOST}
    port = ${SMTP_PORT}
    user = ${SMTP_USER}
    password = ${SMTP_PASSWORD}
}

app {
    baseUrl = ${APP_BASE_URL}
}

services {
    userServiceUrl = "http://user-service:8082"
    userServiceUrl = ${?USER_SERVICE_URL}
}