name: CI – Backend

on:
  push:
    branches: [main, develop]
    paths:
      - 'moodavatar-backend/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'moodavatar-backend/**'

jobs:
  lint-and-test:
    name: ktlint + test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-backend-${{ hashFiles('moodavatar-backend/gradle/wrapper/gradle-wrapper.properties', 'moodavatar-backend/build.gradle.kts') }}
          restore-keys: gradle-backend-

      - name: Make gradlew executable
        run: chmod +x moodavatar-backend/gradlew

      - name: ktlint check
        working-directory: moodavatar-backend
        run: ./gradlew ktlintCheck

      - name: Run tests
        working-directory: moodavatar-backend
        run: ./gradlew test

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-backend
          path: moodavatar-backend/build/reports/tests/
