name: CI – Backend

on:
  push:
    branches: [main, develop]
    paths:
      - 'moodavatar-backend/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'moodavatar-backend/**'

jobs:
  lint-and-test:
    name: ktlint + test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: ktlint check
        working-directory: moodavatar-backend
        run: gradle ktlintCheck

      - name: Run tests
        working-directory: moodavatar-backend
        run: gradle test

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-backend
          path: moodavatar-backend/build/reports/tests/
