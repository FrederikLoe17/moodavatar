name: CI – Frontend

on:
  push:
    branches: [main, develop]
    paths:
      - 'moodavatar-frontend/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'moodavatar-frontend/**'

jobs:
  type-check-and-build:
    name: Type-check & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: moodavatar-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: moodavatar-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx vue-tsc --noEmit

      - name: Build
        run: npm run build
