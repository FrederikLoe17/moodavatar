services:
  mongodb:
    image: mongo:7
    container_name: moodavatar-avatar-mongo
    environment:
      MONGO_INITDB_DATABASE: moodavatar_avatar
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  avatar-service:
    build: .
    container_name: moodavatar-avatar
    ports:
      - "8083:8083"
    environment:
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB:  moodavatar_avatar
      JWT_SECRET:   super-secret-jwt-key-change-in-production
      JWT_ISSUER:   moodavatar
      JWT_AUDIENCE: moodavatar-users
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo_data:
