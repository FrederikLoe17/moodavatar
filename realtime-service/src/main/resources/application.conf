ktor {
    deployment {
        port = 8084
        port = ${?PORT}
    }
    application {
        modules = [ com.moodavatar.realtime.ApplicationKt.module ]
    }
}

jwt {
    secret = "super-secret-jwt-key-change-in-production"
    secret = ${?JWT_SECRET}
    issuer = "moodavatar"
    audience = "moodavatar-users"
}

services {
    userService = "http://user-service:8082"
    userService = ${?USER_SERVICE_URL}
    notificationService = "http://notification-service:8085"
    notificationService = ${?NOTIFICATION_SERVICE_URL}
    avatarService = "http://avatar-service:8083"
    avatarService = ${?AVATAR_SERVICE_URL}
}

redis {
    host = "redis"
    host = ${?REDIS_HOST}
    port = 6379
    port = ${?REDIS_PORT}
}
