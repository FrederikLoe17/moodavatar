ktor {
    deployment {
        port = 8085
        port = ${?PORT}
    }
    application {
        modules = [ com.moodavatar.notification.ApplicationKt.module ]
    }
}

jwt {
    secret   = "super-secret-jwt-key-change-in-production"
    secret   = ${?JWT_SECRET}
    issuer   = "moodavatar"
    audience = "moodavatar-users"
}

database {
    host     = "localhost"
    host     = ${?DB_HOST}
    port     = 5432
    port     = ${?DB_PORT}
    name     = "moodavatar_notification"
    name     = ${?DB_NAME}
    user     = "moodavatar"
    user     = ${?DB_USER}
    password = "secret123"
    password = ${?DB_PASSWORD}
}

rabbitmq {
    host     = "rabbitmq"
    host     = ${?RABBITMQ_HOST}
    port     = 5672
    port     = ${?RABBITMQ_PORT}
    user     = "guest"
    user     = ${?RABBITMQ_USER}
    password = "guest"
    password = ${?RABBITMQ_PASSWORD}
}
