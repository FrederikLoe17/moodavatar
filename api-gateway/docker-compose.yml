services:
  api-gateway:
    build: .
    container_name: moodavatar-gateway
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET:    super-secret-jwt-key-change-in-production
      JWT_ISSUER:    moodavatar
      JWT_AUDIENCE:  moodavatar-users
      AUTH_SERVICE_URL:   http://host.docker.internal:8081
      USER_SERVICE_URL:   http://host.docker.internal:8082
      AVATAR_SERVICE_URL: http://host.docker.internal:8083
      ALLOWED_ORIGIN:     http://localhost:5173
      # RATE_LIMIT_PER_MIN: 120   # optional, uncomment to override
    extra_hosts:
      - "host.docker.internal:host-gateway"
