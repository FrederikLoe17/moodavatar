ktor {
    deployment { port = 8080 }
    application { modules = [ com.moodavatar.gateway.ApplicationKt.module ] }
}

jwt {
    secret   = ${JWT_SECRET}
    issuer   = ${JWT_ISSUER}
    audience = ${JWT_AUDIENCE}
}

services {
    authUrl          = ${AUTH_SERVICE_URL}
    userUrl          = ${USER_SERVICE_URL}
    avatarUrl        = ${AVATAR_SERVICE_URL}
    notificationUrl  = "http://notification-service:8085"
    notificationUrl  = ${?NOTIFICATION_SERVICE_URL}
}

gateway {
    allowedOrigin    = ${ALLOWED_ORIGIN}
    rateLimitPerMin  = ${?RATE_LIMIT_PER_MIN}   # optional, default 120
}
