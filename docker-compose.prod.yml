services:

  # ── Reverse Proxy ────────────────────────────────────────────────────────

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - frontend
      - api-gateway
      - realtime-service

  # ── Frontend ─────────────────────────────────────────────────────────────

  frontend:
    image: ghcr.io/frederikloe17/moodavatar-frontend:latest
    restart: unless-stopped

  # ── Databases ─────────────────────────────────────────────────────────────

  postgres-auth:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: moodavatar_auth
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d moodavatar_auth"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres-user:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: moodavatar_user
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d moodavatar_user"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres-notification:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: moodavatar_notification
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_notification_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d moodavatar_notification"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: moodavatar_avatar
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  # ── Services ──────────────────────────────────────────────────────────────

  auth-service:
    image: ghcr.io/frederikloe17/moodavatar-auth:latest
    restart: unless-stopped
    environment:
      DB_HOST: postgres-auth
      DB_PORT: 5432
      DB_NAME: moodavatar_auth
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_ACCESS_EXPIRY_MS: ${JWT_ACCESS_EXPIRY_MS}
      JWT_REFRESH_EXPIRY_MS: ${JWT_REFRESH_EXPIRY_MS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      APP_BASE_URL: https://${DOMAIN}
      USER_SERVICE_URL: http://user-service:8082
    depends_on:
      postgres-auth:
        condition: service_healthy

  user-service:
    image: ghcr.io/frederikloe17/moodavatar-user:latest
    restart: unless-stopped
    environment:
      DB_HOST: postgres-user
      DB_PORT: 5432
      DB_NAME: moodavatar_user
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      AUTH_SERVICE_URL: http://auth-service:8081
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASS}
    depends_on:
      postgres-user:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  avatar-service:
    image: ghcr.io/frederikloe17/moodavatar-avatar:latest
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: moodavatar_avatar
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
    depends_on:
      mongodb:
        condition: service_healthy

  api-gateway:
    image: ghcr.io/frederikloe17/moodavatar-gateway:latest
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      AUTH_SERVICE_URL: http://auth-service:8081
      USER_SERVICE_URL: http://user-service:8082
      AVATAR_SERVICE_URL: http://avatar-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8085
      ALLOWED_ORIGIN: https://${DOMAIN}
    depends_on:
      - auth-service
      - user-service
      - avatar-service

  realtime-service:
    image: ghcr.io/frederikloe17/moodavatar-realtime:latest
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      USER_SERVICE_URL: http://user-service:8082
      NOTIFICATION_SERVICE_URL: http://notification-service:8085
      AVATAR_SERVICE_URL: http://avatar-service:8083
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
      user-service:
        condition: service_started

  notification-service:
    image: ghcr.io/frederikloe17/moodavatar-notification:latest
    restart: unless-stopped
    environment:
      DB_HOST: postgres-notification
      DB_PORT: 5432
      DB_NAME: moodavatar_notification
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASS}
    depends_on:
      postgres-notification:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
  postgres_auth_data:
  postgres_user_data:
  postgres_notification_data:
  mongo_data:
